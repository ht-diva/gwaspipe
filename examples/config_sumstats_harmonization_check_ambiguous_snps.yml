---
# common parameters
n_cores: &cores 4

# This is an ordered dict that contains the order in which the steps are run.
run_sequence: !!omap
  - 1: 'basic_check'
  - 2: 'infer_build'
  - 3: 'fill_data'
  - 4: 'harmonize'
  - 5: 'sort_alphabetically'
  - 6: 'check_ambiguous_snps'
  - 7: 'write_tsv'
  - 8: 'write_parquet'


steps:
  basic_check: # see https://cloufield.github.io/gwaslab/Standardization/
    params:
      run: True
    gl_params:
      threads: *cores
      normalize: True
  infer_build: # see https://cloufield.github.io/gwaslab/InferBuild/
    params:
      run: True
  fill_data: # see https://cloufield.github.io/gwaslab/Conversion/#fill_data
    params:
      run: True
    gl_params:
      to_fill: ['MLOG10P']
      overwrite: False
      extreme: False
  harmonize: # see https://cloufield.github.io/gwaslab/Harmonization/
    params:
      run: True
    gl_params:
      basic_check: False
      threads: *cores
  sort_alphabetically:
    params:
      run: True
    gl_params:
      threads: *cores
  check_ambiguous_snps:
    params:
      run: True
      workspace: "outputs"
      workspace_subfolder: True
  write_tsv:
    params:
      run: True
      workspace: "outputs"
      workspace_subfolder: True
    gl_params:
      fmt: "gwaslab"
      xymt_number: True
      to_csvargs:
        compression:
          method: "gzip"
          compresslevel: 1
          mtime: 1
  write_parquet:
    params:
      run: True
      workspace: "outputs"
      workspace_subfolder: True
    gl_params:
      fmt: "gwaslab"
      tab_fmt: "parquet"

# Filename transformation
# use the filename mask to extract elements from the filename to be used in the output filename
# filename_mask: [ True, True, True, False]
# filename_sep: '.'

# IO
root_path: "results"
log_filename: "gwaspipe.log"
# formatbook_path: "path/to/custom_formatbook.json"     # fill this var if you want to provide a custom formatbook